# Test-only configuration — uses H2 in-memory DB, no external deps
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable data.sql — it has TRUNCATE statements that fail on empty H2
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# JWT
app.jwtSecret=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RzLW5lZWRzLXRvLWJlLWxvbmctZW5vdWdo
app.jwtExpirationMs=3600000

# Disable mail
spring.mail.host=localhost
spring.mail.port=2525

# Disable Redis (no Redis in test) — use in-memory cache instead
spring.cache.type=simple
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# App config
app.frontend.url=http://localhost:5173
app.backend.url=http://localhost:8080
app.reservation.max-stalls=3
file.upload-dir=uploads/

# Pricing (cents)
app.pricing.stall.small=500000
app.pricing.stall.medium=1000000
app.pricing.stall.large=2000000
app.pricing.vip-multiplier=1.2

# Stripe test key (dummy)
stripe.api.key=sk_test_dummy
stripe.public.key=pk_test_dummy

# Rate limiting
app.ratelimit.capacity=100
app.ratelimit.refill-seconds=60

# Seeding credentials
app.seed.admin.username=testadmin
app.seed.admin.password=testadmin123
app.seed.vendor.username=testvendor
app.seed.vendor.password=testvendor123
