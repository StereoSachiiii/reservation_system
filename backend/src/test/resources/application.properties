# Test-only configuration — uses H2 in-memory DB, no external deps
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT
app.jwtSecret=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RzLW5lZWRzLXRvLWJlLWxvbmctZW5vdWdo
app.jwtExpirationMs=3600000

# Disable mail
spring.mail.host=localhost
spring.mail.port=2525

# Disable Redis
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# App config
app.frontend.url=http://localhost:5173
app.backend.url=http://localhost:8080
app.reservation.max-stalls=3

# Stripe test key (dummy)
stripe.api.key=sk_test_dummy
stripe.public.key=pk_test_dummy

# Rate limiting
app.ratelimit.capacity=100
app.ratelimit.refill-seconds=60

# Seeding credentials
app.seed.admin.username=testadmin
app.seed.admin.password=testadmin123
app.seed.vendor.username=testvendor
app.seed.vendor.password=testvendor123
