version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookfair
      POSTGRES_USER: bookfair
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookfair -d bookfair"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
      resources:
        limits:
          memory: 512M
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - reservation-net

  redis:
    image: redis:7-alpine
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    networks:
      - reservation-net

  backend:
    build: ./backend
    image: bookfair-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/bookfair
      DB_USERNAME: bookfair
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: 86400000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      BACKEND_URL: ${BACKEND_URL:-http://localhost/api}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
      FILE_UPLOAD_DIR: uploads/
      MAX_STALLS: 3
      STALL_SMALL_PRICE: 500000
      STALL_MEDIUM_PRICE: 1000000
      STALL_LARGE_PRICE: 2000000
      VIP_MULTIPLIER: 1.2
      SEED_ADMIN_USER: admin
      SEED_ADMIN_PASS: ${SEED_ADMIN_PASS}
      SEED_VENDOR_USER: vendor
      SEED_VENDOR_PASS: ${SEED_VENDOR_PASS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      APP_RAG_SERVICE_URL: http://ai-service:8000/query
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./logs/backend:/app/logs
      - ./certs:/etc/ssl/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - reservation-net

  ai-service:
    build: ./ai-service
    image: bookfair-ai-service
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
    volumes:
      - .:/app/docs:ro
    networks:
      - reservation-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
        VITE_STRIPE_KEY: ${STRIPE_PUBLIC_KEY}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    image: bookfair-frontend
    ports:
      - "3000:80"
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./logs/frontend:/var/log/nginx
      - ./certs:/etc/ssl/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - reservation-net

networks:
  reservation-net:

volumes:
  postgres_data:
