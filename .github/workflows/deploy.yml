name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/bookfair-backend:latest ./backend
          docker push ${{ secrets.ECR_REGISTRY }}/bookfair-backend:latest

      - name: Build and push frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=https://eazyfair.duckdns.org/api/v1 \
            --build-arg VITE_STRIPE_KEY=${{ secrets.STRIPE_PUBLIC_KEY }} \
            -t ${{ secrets.ECR_REGISTRY }}/bookfair-frontend:latest ./frontend
          docker push ${{ secrets.ECR_REGISTRY }}/bookfair-frontend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            docker compose pull
            docker compose up -d
            docker image prune -f